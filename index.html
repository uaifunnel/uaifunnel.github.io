<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página em Manutenção</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #121212, #1f1f1f);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        img {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 0 10px #00e0ff);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 2.2rem;
            margin-top: 20px;
           
            background: linear-gradient(270deg, #2d8fb9, #95bc3f, #ffa100, #d83e4c, #545454);
            background-size: 1000% 1000%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 10s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .message {
            margin-top: 10px;
            font-size: 1rem;
            color: #cccccc;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: transparent;
            color: #7a7a7a;
            position:fixed;
            bottom: 0;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <img src="funil_animado.gif" alt="Loading Funil">

    <h1 style="font-weight: 800 !important;">Estamos preparando algo incrível!</h1>
    <p class="message">Nossa página está em manutenção. Voltaremos em breve com novidades.</p>

    <footer>© 2025 UaiFunnel. Todos os direitos reservados.</footer>

</body>
</html>
