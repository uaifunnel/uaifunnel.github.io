<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UaiFunnel - Página em Manutenção</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <!--Bootstrap icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!--/Bootstrap icons-->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #121212, #1f1f1f, #323232);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        img#img {
            width: 150px;
            height: auto;
            filter: drop-shadow(0 0 10px #00e0ff);
            animation: float 4s ease-in-out infinite;
        }

        img.logo {
            width: 250px;
            height: auto;
            margin-top: 10px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 2rem;
            margin-top: 20px;
            font-weight: 900;
            background: linear-gradient(270deg, #2d8fb9, #95bc3f, #ffa100, #d83e4c, #545454);
            background-size: 1000% 1000%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 10s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .message {
            margin-top: 10px;
            font-size: 1rem;
            color: #cccccc;
            padding: 0 10px;
        }

        .newsletter {
            margin-top: 30px;
            max-width: 400px;
            width: 100%;
        }

        .newsletter p {
            font-size: 1rem;
            font-weight: 600;
            color: #cccccc;
            margin-bottom: 10px;
        }

        #newsletter-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        #newsletter-form input {
            background-color: transparent;
            padding: 14px;
            border: 2px solid #5d5d5d;
            border-radius: 10px;
            color: #cccccc;
            font-size: 1rem;
            font-weight: 500;
        }

        #newsletter-form input:focus {
            border: 3px solid #d83e4c;
        }

        #newsletter-form button {
            background-color: #d83e4c;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .6s;
        }

        #newsletter-form button:hover {
            background-color: #2d8fb9;
        }

        #form-message {
            font-size: 0.9rem;
            color: #95bc3f;
            text-align: center;
            min-height: 20px;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: transparent;
            color: #7a7a7a;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            img#img {
                width: 100px;
            }

            img.logo {
                width: 180px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .newsletter p {
                font-size: 0.9rem;
            }
            
            #newsletter-form input,
            #newsletter-form button {
                font-size: 0.9rem;
                padding: 12px;
            }

            .message {
                font-size: 0.9rem;
            }
        }
    
    /* ---WhatsApp icon */
    .whatsapp-icon {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #25D366;
        color: white;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        transition: 0.3s;
    }

    .whatsapp-icon:hover {
        width: 50px;
        height: 50px;
        background-color: #1EBE54;
        font-size: 30px;
        cursor: pointer;
    }
    /* ---/WhatsApp icon */
    </style>
</head>
<body>

    <img id="img" src="img/funil_animado.gif" alt="Loading Funil">
    <img class="logo" src="img/uailogo.png" alt="Logo UaiFunnel">

    <h1>Estamos preparando algo incrível!</h1>
    <p class="message">Voltaremos em breve com novidades.</p>

    <div class="newsletter">
        <p>Quer ser avisado quando estiver tudo pronto?</p>
        <form id="newsletter-form">
            <input type="email" name="email" placeholder="Digite seu melhor e-mail" required>
            <button type="submit">Quero ser avisado! <i class="bi bi-hand-thumbs-up"></i></button>
            <p id="form-message"></p>
        </form>
    </div>

    <!-- WhatsApp icon -->
    <a href="https://wa.me/5521992942010" target="_blank" class="whatsapp-icon">
        <i class="bi bi-whatsapp"></i>
    </a>
    <!-- /WhatsApp icon -->

    <footer>© 2025 UaiFunnel. Todos os direitos reservados.</footer>

    <script>
        const form = document.getElementById('newsletter-form');
        const message = document.getElementById('form-message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = form.email.value;

            fetch('https://script.google.com/macros/s/AKfycbza35MfkRbizomr1P9A86T0ndP3NejbIrS9f7hapxSdB1EX2ElSHg00cfgsdflegNrM/exec', {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email)
            });

            form.reset();
            message.textContent = 'E-mail cadastrado com sucesso! 🎉';
        });
    </script>

</body>
</html>
